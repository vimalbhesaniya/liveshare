service: liveshare-api

frameworkVersion: "3"

plugins:
  - serverless-dotenv-plugin
  - serverless-esbuild

custom:
  dotenv:
    path: ../.env
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
    packager: npm
    external:
      - mongoose
      - mongodb
      - "@aws-sdk/client-apigatewaymanagementapi"
      - "@aws-sdk/client-dynamodb"
      - "@aws-sdk/util-dynamodb"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 1024
  timeout: 29
  httpApi:
    cors:
      allowedOrigins:
        - https://www.liveshare.dev
        - https://liveshare.dev
        - http://localhost:8080
      allowedMethods:
        - GET
        - POST
        - PATCH
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization
      allowCredentials: true
  environment:
    NODE_ENV: production
    MONGODB_URI: ${env:MONGODB_URI, ''}
    CLIENT_ORIGIN: ${env:CLIENT_ORIGIN, 'https://www.liveshare.dev,https://liveshare.dev'}
    CONNECTIONS_TABLE: ${self:service}-connections-${sls:stage}
    SNIPPETS_TABLE: ${self:service}-snippets-${sls:stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource:
            - !GetAtt ConnectionsTable.Arn
            - !Sub "${ConnectionsTable.Arn}/index/*"
            - !GetAtt SnippetsTable.Arn
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*"

functions:
  api:
    handler: src/handler.api
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

  wsConnect:
    handler: src/websocket/connect.handler
    events:
      - websocket:
          route: $connect

  wsDisconnect:
    handler: src/websocket/disconnect.handler
    events:
      - websocket:
          route: $disconnect

  wsMessage:
    handler: src/websocket/message.handler
    events:
      - websocket:
          route: $default

resources:
  Resources:
    SnippetsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SNIPPETS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: uniqueCode
            AttributeType: S
        KeySchema:
          - AttributeName: uniqueCode
            KeyType: HASH

    ConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONNECTIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
          - AttributeName: roomCode
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: RoomCodeIndex
            KeySchema:
              - AttributeName: roomCode
                KeyType: HASH
            Projection:
              ProjectionType: ALL
